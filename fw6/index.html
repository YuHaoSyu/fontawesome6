<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fontawesome</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
  <form class="container-fluid" action="/">
    <div class="row">
      <div class="col-8">
        <div class="input-group mb-3">
          <select class="form-select" id="icon-pack" name="pack">
            <option value="classic" selected>Classic</option>
            <option value="duotone">Duotone</option>
            <option value="sharp">Sharp</option>
            <option value="sharpDuotone">Sharp Duotone</option>
          </select>
          <select class="form-select" id="icon-style" name="style">
            <option value="Solid">Solid</option>
            <option value="Regular">Regular</option>
            <option value="Light" selected>Light</option>
            <option value="Thin">Thin</option>
          </select>
          <input type="text" class="form-control" id="icon-name" aria-label="Icon name" name="name" style="flex-grow: 2;">
          <button class="btn btn-outline-secondary" type="submit" id="search">Search</button>
        </div>
      </div>
    </div>
  </form>
  <div class="container-fluid">

    <div class="row gy-3">
      <div class="col-12"><a id="search-result" href="https://fontawesome.com/search" target="_blank">Fontawesome</a></div>
    </div>
    <div class="row gy-3 align-items-center" id="icon-container"></div>
  </div>

  <template id="temp">
    <div class="col-auto">
      <a class="icon-download" href="https://site-assets.fontawesome.com/releases/v6.7.2/svgs/{{iconType}}/{{name}}.svg" download="{{name}}.svg"><img width="36" height="36" title="{{name}}" alt="{{iconType}} {{name}}" src="https://site-assets.fontawesome.com/releases/v6.7.2/svgs/{{iconType}}/{{name}}.svg"></a>
    </div>
  </template>

  <script src="../js/iconName.js"></script>
  <script>
    const type = {
      classicSolid: 'solid', classicRegular: 'regular', classicLight: 'light', classicThin: 'thin', duotoneSolid: 'duotone', duotoneRegular: 'duotone-regular', duotoneLight: 'duotone-light', duotoneThin: 'duotone-thin', sharpSolid: 'sharp-solid', sharpRegular: 'sharp-regular', sharpLight: 'sharp-light', sharpThin: 'sharp-thin', sharpDuotoneSolid: 'sharp-duotone-solid', sharpDuotoneRegular: 'sharp-duotone-regular', sharpDuotoneLight: 'sharp-duotone-light', sharpDuotoneThin: 'sharp-duotone-thin',
    }

    const svgTemp = document.getElementById('temp')
    function SVGcol(iconType, name) {
      const cloneTemp = svgTemp.content.cloneNode(true)
      return cloneTemp.firstElementChild.outerHTML
        .replace(/{{iconType}}/g, iconType)
        .replace(/{{name}}/g, name)
    }
    async function downloadHandler(e) {
      e.preventDefault()
      const res = await fetch(this.href)
      const text = await res.text()
      const license = '<!--! Font Awesome Pro 6.7.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2024 Fonticons, Inc. -->'
      const svg = text.replace(license, '').replace('xmlns="http://www.w3.org/2000/svg" ', '')

      const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' })
      const a = document.createElement('a')
      a.href = URL.createObjectURL(blob)
      a.download = this.download
      a.click()
      URL.revokeObjectURL(a.href)
    }
    document.querySelector('form').addEventListener('submit', function (e) {
      e.preventDefault()

      const formData = new FormData(this)
      const { pack, style, name } = Object.fromEntries(formData)
      if (name == '') return
      const resultLink = document.getElementById('search-result')
      resultLink.href = `https://fontawesome.com/search?q=${name}&ip=${pack}&s=${style}`
      resultLink.textContent = `Fontawesome ${name}`

      const iconType = type[pack + style]
      const fetchIcons = icons.filter(i => i.match(name)).flatMap(i => SVGcol(iconType, i))

      Promise.all(fetchIcons).then(result => {
        const iconRow = document.getElementById('icon-container')
        let downloadBtn = [...iconRow.querySelectorAll('.icon-download')]
        downloadBtn.forEach(e => e.removeEventListener('click', downloadHandler))
        iconRow.innerHTML = result.join('')
        downloadBtn = [...iconRow.querySelectorAll('.icon-download')]
        downloadBtn.forEach(e => e.addEventListener('click', downloadHandler))
      })
    })
  </script>
</body>

</html>
